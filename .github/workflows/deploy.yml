name: Deploy to AWS

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: aws-actions/setup-sam@v2

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-north-1

      - name: SAM Build
        run: sam build
        working-directory: .

      - name: SAM Deploy
        run: |
          sam deploy \
            --stack-name bedrock-api \
            --region eu-north-1 \
            --capabilities CAPABILITY_IAM \
            --resolve-s3 \
            --s3-prefix bedrock-api \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset
        working-directory: .

      - name: Smoke test
        run: |
          sleep 5
          RESPONSE=$(curl -sf -X POST https://8vsk7ohk3j.execute-api.eu-north-1.amazonaws.com/Prod/chat \
            -H "Content-Type: application/json" \
            -d '{"message": "Reply with exactly one word: OK"}')
          echo "Smoke test response: $RESPONSE"
          echo "$RESPONSE" | python3 -c "import sys,json; r=json.load(sys.stdin); exit(0 if r.get('response') else 1)"
          echo "✅ Smoke test passed"
