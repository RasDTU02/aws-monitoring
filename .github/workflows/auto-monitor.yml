name: Auto Monitor & Report

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  issues: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install boto3 requests deepagents-cli "deepagents-cli[bedrock]" -q

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-north-1

      - name: Configure Deep Agents
        run: |
          mkdir -p ~/.deepagents/agent/skills
          echo "# CI Agent" > ~/.deepagents/agent/AGENTS.md
          mkdir -p ~/.deepagents
          cat > ~/.deepagents/config.toml << 'EOF'
          [models]
          recent = "bedrock_converse:eu.anthropic.claude-sonnet-4-6"
          [warnings]
          suppress = ["tavily", "ripgrep"]
          EOF

      - name: Run monitor (single poll)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LANGGRAPH_AUTH_TYPE: noop
          LANGSMITH_LANGGRAPH_API_VARIANT: local_dev
          LANGGRAPH_DISABLE_FILE_PERSISTENCE: "false"
          LANGGRAPH_UI_BUNDLER: "true"
          LANGGRAPH_RUNTIME_EDITION: inmem
          LANGGRAPH_ALLOW_BLOCKING: "false"
        run: python3 scripts/monitor_and_report.py --once
