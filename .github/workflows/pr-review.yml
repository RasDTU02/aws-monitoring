name: PR Review (AI Agent)

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  pull-requests: write
  contents: read

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > /tmp/pr_diff.txt
          echo "diff_size=$(wc -c < /tmp/pr_diff.txt)" >> $GITHUB_OUTPUT

      - name: Post AI review placeholder comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const diff = fs.readFileSync('/tmp/pr_diff.txt', 'utf8').slice(0, 3000);
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## 🤖 AI Agent Review\n\n*On behalf of @RasDTU02 — automated review by the monitoring agent*\n\n**Diff summary:**\n\`\`\`diff\n${diff}\n\`\`\`\n\n> ⏳ Full agent review pending. Run the agent locally to get a complete evaluation including health check against the deployed API.`
            });
