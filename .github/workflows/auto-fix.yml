name: Auto-Fix Agent

on:
  issues:
    types: [opened, reopened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to fix'
        required: true
      issue_title:
        description: 'Issue title'
        required: true
      issue_body:
        description: 'Issue body'
        required: false

permissions:
  id-token: write
  contents: write
  pull-requests: write
  issues: write

jobs:
  auto-fix:
    if: github.event_name == 'workflow_dispatch' || contains(github.event.issue.labels.*.name, 'bug')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install boto3 requests deepagents-cli "deepagents-cli[bedrock]" -q

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-north-1

      - name: Configure Deep Agents
        run: |
          mkdir -p ~/.deepagents/agent/skills
          echo "# CI Agent" > ~/.deepagents/agent/AGENTS.md
          mkdir -p ~/.deepagents
          cat > ~/.deepagents/config.toml << 'EOF'
          [models]
          recent = "bedrock_converse:eu.anthropic.claude-sonnet-4-6"
          [warnings]
          suppress = ["tavily", "ripgrep"]
          EOF

      - name: Run auto-fix agent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_TOKEN: ${{ secrets.PR_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number || inputs.issue_number }}
          ISSUE_TITLE: ${{ github.event.issue.title || inputs.issue_title }}
          ISSUE_BODY: ${{ github.event.issue.body || inputs.issue_body }}
          LANGGRAPH_AUTH_TYPE: noop
          LANGSMITH_LANGGRAPH_API_VARIANT: local_dev
          LANGGRAPH_DISABLE_FILE_PERSISTENCE: "false"
          LANGGRAPH_UI_BUNDLER: "true"
          LANGGRAPH_RUNTIME_EDITION: inmem
          LANGGRAPH_ALLOW_BLOCKING: "false"
        run: python3 scripts/auto_fix_agent.py
